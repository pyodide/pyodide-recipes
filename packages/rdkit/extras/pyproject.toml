[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rdkit"
version = "0.0.0"
description = "RDKit cheminformatics library for Pyodide"

[tool.setuptools.packages.find]
include = ["rdkit*"]

[tool.setuptools.package-data]
"*" = ["*.so.wasm"]
rdkit = ["Data/**/*"]

package:
  name: rasterio
  version: 1.5.0
  top-level:
    - rasterio
source:
  url: https://files.pythonhosted.org/packages/source/r/rasterio/rasterio-1.5.0.tar.gz
  sha256: 1e0ea56b02eea4989b36edf8e58a5a3ef40e1b7edcb04def2603accd5ab3ee7b
requirements:
  host:
    - numpy
    - libgdal
    - libproj
  run:
    - numpy
    - affine
    - attrs
    - certifi
    - click
    - cligj
      # - click-plugins # only for rio cli?
build:
  vendor-sharedlib: true
  script: |
    export PACKAGE_DATA=1
    export GDAL_CONFIG=${WASM_LIBRARY_DIR}/bin/gdal-config
    export GDAL_DATA=${WASM_LIBRARY_DIR}/share/gdal
    export PROJ_LIB=${WASM_LIBRARY_DIR}/share/proj
    echo ${GDAL_CONFIG}
    echo ${GDAL_DATA}
    echo ${PROJ_LIB}
test:
  imports:
    - rasterio
about:
  home: https://github.com/rasterio/rasterio
  PyPI: https://pypi.org/project/rasterio
  summary: Fast and direct raster I/O for use with Numpy and SciPy
  license: BSD-3-Clause
extra:
  recipe-maintainers:
    - kjmalek

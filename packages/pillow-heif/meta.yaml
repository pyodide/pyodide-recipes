package:
  name: pillow-heif
  version: 1.3.0
  top-level:
    - pillow_heif
source:
  url: https://files.pythonhosted.org/packages/source/p/pillow_heif/pillow_heif-1.3.0.tar.gz
  sha256: af8d2bda85e395677d5bb50d7bda3b5655c946cc95b913b5e7222fabacbb467f
requirements:
  run:
    - cffi
    - Pillow
  host:
    - cffi
    - libheif
build:
  vendor-sharedlib: true
  script: |
    export LIBHEIF_ROOT=${WASM_LIBRARY_DIR}
test:
  imports:
    - pillow_heif
about:
  home: https://github.com/bigcat88/pillow_heif
  PyPI: https://pypi.org/project/pillow_heif
  summary: Python 3.6+ interface to libheif library
  license: LGPL-2.1
# Note: this package needs to be manually upgraded to the next version

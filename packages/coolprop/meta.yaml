package:
  name: coolprop
  version: 7.2.0
  top-level:
    - CoolProp

source:
  url: https://files.pythonhosted.org/packages/source/c/coolprop/coolprop-7.2.0.tar.gz
  sha256: b1e205d67e7f4f38e26d2ed0abb815e7a0f643b069407c238f3d1b3631791b75
  extract_dir: source

build:
  cflags: -fwasm-exceptions -DCOOLPROP_NO_INCBIN
  cxxflags: -fwasm-exceptions -DCOOLPROP_NO_INCBIN
  ldflags: -fwasm-exceptions

requirements:
  run:
    - numpy
    - matplotlib
  constraint:
    - cython < 3.1.0
test:
  imports:
    - CoolProp
    - CoolProp.GUI
    - CoolProp.Plots

about:
  home: http://www.coolprop.org
  PyPI: https://pypi.org/project/CoolProp
  summary: Open-source thermodynamic and transport properties database
  license: MIT

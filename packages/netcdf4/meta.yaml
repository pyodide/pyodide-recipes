package:
  name: netcdf4
  version: 1.7.4
  top-level:
    - netCDF4
source:
  url: https://files.pythonhosted.org/packages/source/n/netcdf4/netcdf4-1.7.4.tar.gz
  sha256: cdbfdc92d6f4d7192ca8506c9b3d4c1d9892969ff28d8e8e1fc97ca08bf12164
requirements:
  host:
    - libhdf5
    - libnetcdf
  run:
    - numpy
    - packaging
    - cftime
    - certifi
test:
  imports:
    - netCDF4
build:
  vendor-sharedlib: true
  script: |
    export PATH=${WASM_LIBRARY_DIR}/bin:${PATH}
    export HDF5_DIR=${WASM_LIBRARY_DIR}
    echo ${HDF5_DIR}
  ldflags: |
    -L$(WASM_LIBRARY_DIR)/lib
    -lhdf5
    -lhdf5_hl
about:
  home: https://github.com/Unidata/netcdf4-python
  PyPI: https://pypi.org/project/netcdf4
  summary: Provides an object-oriented python interface to the netCDF version 4
    library
  license: MIT
